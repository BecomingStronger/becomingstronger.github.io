<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 · Becoming Stronger</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;600&display=swap" rel="stylesheet">
<script>
(function(){var t=null;try{t=localStorage.getItem('bs-theme')}catch(e){}
if(t!=='dark'&&t!=='light')t=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
document.documentElement.setAttribute('data-theme',t);})();
</script>
<style>
:root{--paper:#FBF8F0;--ink:#1E2B22;--soft:#4A5A4E;--leaf-deep:#24492F;--gold:#E0A526;--line:rgba(30,43,34,.28)}
html[data-theme="dark"]{--paper:#000;--ink:#EFE9DB;--soft:#A9B4A6;--leaf-deep:#2E5A3B;--gold:#E4B04A;--line:rgba(239,233,219,.26)}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--paper);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,"Segoe UI",Roboto,sans-serif;text-align:center}
.in{border:1px solid var(--line);padding:56px 64px;max-width:520px;margin:24px}
h1{font-family:"Raleway",sans-serif;font-weight:600;font-size:2.2rem;margin:22px 0 10px}
p{color:var(--soft);margin:0 0 26px}
a.btn{display:inline-block;font-weight:600;font-size:.95rem;padding:14px 24px;text-decoration:none;
  border:1.5px solid var(--leaf-deep);background:var(--leaf-deep);color:var(--paper)}
html[data-theme="dark"] a.btn{color:var(--ink)}
.gold{color:var(--gold)}
[data-theme="dark"] svg path.p1{fill:#8FCF9F;stroke:#8FCF9F}
[data-theme="dark"] svg path.p2{fill:#6CB27E;stroke:#6CB27E}
[data-theme="dark"] svg path.p3{fill:#4E8659;stroke:#4E8659}
</style>
</head>
<body>
<div class="in">
  <svg width="110" height="95" viewBox="0 0 280 243" aria-hidden="true">
    <path class="p1" fill="#1C3A25" stroke="#1C3A25" stroke-width="9" stroke-linejoin="miter" d="M55.06 182.44 80.69 182.56 151.22 59.84 252.22 228.15 264.77 205.26 151.56 13.25Z"/>
    <path class="p2" fill="#2E5A3B" stroke="#2E5A3B" stroke-width="9" stroke-linejoin="miter" d="M15.63 206.06 27.5 228.44 252.3 228.28 151.23 59.86 138.55 81.93 211.73 205.93Z"/>
    <path class="p3" fill="#437A50" stroke="#437A50" stroke-width="9" stroke-linejoin="miter" d="M124.06 12.99 15.64 206.03 211.76 205.97 197.88 182.51 54.95 182.53 151.67 13.25Z"/>
  </svg>
  <h1><span class="gold">404</span> · This page is an impossible object</h1>
  <p>Like the triangle, it looks plausible but doesn't exist. The rest of the site is real, though.</p>
  <a class="btn" href="/">Take me home</a>
</div>
</body>
</html>
